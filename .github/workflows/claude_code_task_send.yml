name: Claude Code Task Send

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    runs-on: ubuntu-latest
    # timeout-minutes: 30
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: 'dev'

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.OPENROUTER_API_KEY }}
          # Optional: limit which files the agent can modify
          # allowed_tools: "Read,Write,Edit,Bash,Glob,Grep"
          show_full_output: true
          base_branch: dev
          prompt: |
            Read the issue description and the comment that triggered this workflow.
            Implement the requested changes.
            Create a new branch, commit your changes, and open a pull request.
            Reference the issue number in the PR description.
            If the request is unclear or too large, post a comment explaining what
            clarification you need instead of implementing.
          claude_args: |
            --allowedTools "Bash(gh *)"
        env:
          ANTHROPIC_BASE_URL: https://openrouter.ai/api
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ vars.OPENROUTER_OPUS_LEVEL_MODEL }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ vars.OPENROUTER_SONNET_LEVEL_MODEL }}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${{ vars.OPENROUTER_HAIKU_LEVEL_MODEL }}
