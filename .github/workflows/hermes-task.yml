# This is a basic workflow to help you get started with Actions

name: hermes-task

# Controls when the workflow will run
on:
  issues:
    types:
      - labeled

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "task"
  task:
    if: github.event.label.name == 'hermes-task' && github.event.issue.user.login == 'KyoTensu'
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Send task to hermes agent
        # Using printf ensures no unintended newlines are added to the payload before hashing
        run: |
          HASH=$(printf '%s' "$BODY" | openssl dgst -sha1 -hmac "$WEBHOOK_SECRET" | awk '{print $NF}')
          SIGNATURE="sha1=$HASH"
          curl -X POST -H "X-Hub-Signature: $SIGNATURE" -H "$TOKENID" -H "$TOKEN" -H 'Content-Type: application/json' -d '$BODY' --insecure "$BASE_URL/webhooks/$WEBHOOKNAME"
        env:
          BASE_URL: ${{secrets.BASEURL}}
          WEBHOOKNAME: "github-issues"
          BODY: ${{toJson(github.event.issue)}}
          TOKENID: ${{secrets.AUTH_TOKEN_ID}}
          TOKEN: ${{secrets.AUTH_TOKEN}}
          WEBHOOKSECRET: ${{secrets.WEBHOOK_SECRET}}
