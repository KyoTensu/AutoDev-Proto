# This is a basic workflow to help you get started with Actions

name: hermes-task

# Controls when the workflow will run
on:
  issues:
    types:
      - labeled

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  task:
    if: github.event.label.name == 'hermes-task' && github.event.issue.user.name == 'KyoTensu'
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Send task to hermes agent
        run: |
          curl -X POST -H '$TOKENID' -H 'TOKEN' -H 'Content-Type: application/json' -d '$BODY' $BASE_URL/webhooks/$WEBHOOKNAME
        env:
          BASE_URL: ${{secrets.BASEURL}}
          WEBHOOKNAME: "github-issues"
          BODY: ${{github.event.issue}}
          TOKENID: ${{secrets.AUTH_TOKEN_ID}}
          TOKEN: ${{secrets.AUTH_TOKEN}}
